<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

/* BODY */
body{
    transition:.4s;
    position:relative;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("img/WhatsApp Image 2026-04-12 at 19.58.20.jpeg") center/cover no-repeat;
    z-index:-2;
}

/* DARK OVERLAY */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0);
    transition:.4s;
    z-index:-1;
}

body.dark::after{
    background:rgba(0,0,0,0.55);
}

/* HEADER */
.header{
    height:150px;
    position:relative;
    border-bottom-left-radius:60% 35px;
    border-bottom-right-radius:70% 35px;
    overflow:hidden;
}

/* HEADER IMAGE */
.header-image{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
}

.header-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* MOVING LIGHT */
.header::before{
    content:"";
    position:absolute;
    top:0;
    left:-60%;
    width:60%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        rgba(255,215,0,0.9),
        rgba(255,255,255,0.4),
        transparent
    );
    filter:blur(6px);
    transform:skewX(-20deg);
    animation:scan 2.8s infinite;
    z-index:2;
}

@keyframes scan{
    0%{left:-60%;}
    50%{left:110%;}
    100%{left:-60%;}
}

/* THEME */
.theme-toggle{
    position:absolute;
    top:15px;
    left:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(0,0,0,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:5;
}

.theme-toggle i{
    position:absolute;
    color:#fff;
    font-size:18px;
}

#sun{display:none;}
body.light #sun{display:block;}
body.light #moon{display:none;}
body.dark #moon{display:block;}
body.dark #sun{display:none;}

/* FLAG */
.lang-btn{
    position:absolute;
    top:15px;
    right:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #fff;
    z-index:5;
}

.lang-btn img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTENT */
.content{
    text-align:center;
    padding:15px;
    margin-top:40px;
}

/* MENU */
.menu-card{
    max-width:360px;
    margin:20px auto;
    padding:18px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    cursor:pointer;
    animation:pulse 1.5s infinite;
    background:#ffcc00;
    color:#000;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.05)}
    100%{transform:scale(1)}
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:30px;
}

.social-btn{
    font-size:28px;
    margin:0 10px;
    color:#ffd700;
}

</style>

<script>
const toggle=document.getElementById("toggle");

    
function saveCart(cart){
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCart();
}

function addToCart(name,price,qty){
    let cart = getCart();
    cart.push({name,price,qty});
    saveCart(cart);
}

function updateCart(){

    let cart = getCart();

    document.getElementById("cartCount").innerText = cart.length;

    let box = document.getElementById("cartItems");
    let total = 0;
    box.innerHTML = "";

    cart.forEach(i=>{
        let sum = i.price * i.qty;
        total += sum;

        box.innerHTML += `
        <div style="display:flex;justify-content:space-between;margin:5px 0">
            <span>${i.name} x${i.qty}</span>
            <span>${sum}₼</span>
        </div>`;
    });

    document.getElementById("cartTotal").innerText =
        "Cəmi: " + total + "₼";

    let text = "Sifariş:%0A";
    cart.forEach(i=>{
        text += `${i.name} x${i.qty}%0A`;
    });

    document.getElementById("whatsappBtn").href =
    "https://wa.me/994501234567?text=" + text;
}

function openCart(){
    document.getElementById("cartModal").style.display="flex";
}

function closeCart(){
    document.getElementById("cartModal").style.display="none";
}

updateCart();

toggle.onclick=()=>{
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
};
</script>
