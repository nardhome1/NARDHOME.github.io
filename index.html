<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

/* BODY */
body{
    transition:.4s;
    position:relative;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("img/WhatsApp Image 2026-04-12 at 19.58.20.jpeg") center/cover no-repeat;
    z-index:-2;
}

/* DARK OVERLAY */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0);
    transition:.4s;
    z-index:-1;
}

body.dark::after{
    background:rgba(0,0,0,0.55);
}

/* HEADER */
.header{
    height:150px;
    position:relative;
    border-bottom-left-radius:60% 35px;
    border-bottom-right-radius:70% 35px;
    overflow:hidden;
}

/* HEADER IMAGE (YENİ) */
.header-image{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
}

.header-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* MOVING LIGHT */
.header::before{
    content:"";
    position:absolute;
    top:0;
    left:-60%;
    width:60%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        rgba(255,215,0,0.9),
        rgba(255,255,255,0.4),
        transparent
    );
    filter:blur(6px);
    transform:skewX(-20deg);
    animation:scan 2.8s infinite;
    z-index:2;
}

@keyframes scan{
    0%{left:-60%;}
    50%{left:110%;}
    100%{left:-60%;}
}

/* THEME */
.theme-toggle{
    position:absolute;
    top:15px;
    left:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(0,0,0,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:5;
}

.theme-toggle i{
    position:absolute;
    color:#fff;
    font-size:18px;
}

#sun{display:none;}
body.light #sun{display:block;}
body.light #moon{display:none;}
body.dark #moon{display:block;}
body.dark #sun{display:none;}

/* FLAG */
.lang-btn{
    position:absolute;
    top:15px;
    right:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #fff;
    z-index:5;
}

.lang-btn img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TITLE */
.title{
    text-align:center;
    margin-top:70px;
}


/* NARD HOME (YENİ STYLE) */
.title h1{
    display:inline-block;
    padding:10px 25px;

    background:#ffd000; /* sarı fon */
    color:#000; /* qara yazı */

    border:3px solid #000;
    border-radius:12px;

    font-family:'Trebuchet MS', sans-serif;
    font-size:28px;
    font-weight:bold;

    letter-spacing:2px;

    box-shadow:
        0 0 10px #ffd000,
        0 0 25px #ffb300;
}



/* STARS */
.stars{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.star{
    font-size:60px;
    color:#ffd700;
    text-shadow:
        0 0 10px #ffcc00,
        0 0 25px #ff9900,
        0 0 40px #ffcc00;
    animation:starAnim 1.2s infinite ease-in-out;
}

.star:nth-child(1){animation-delay:0s;}
.star:nth-child(2){animation-delay:0.1s;}
.star:nth-child(3){animation-delay:0.2s;}
.star:nth-child(4){animation-delay:0.3s;}
.star:nth-child(5){animation-delay:0.4s;}

@keyframes starAnim{
    0%{transform:scale(0.7) rotate(-5deg); opacity:0.5;}
    50%{transform:scale(1.3) rotate(5deg); opacity:1;}
    100%{transform:scale(0.9) rotate(0deg); opacity:0.8;}
}

/* CONTENT */
.content{
    text-align:center;
    padding:15px;
    margin-top:30px;
}

/* MENU */
.menu-card{
    max-width:360px;
    margin:20px auto;
    padding:18px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    cursor:pointer;
    animation:pulse 1.5s infinite;
    background:#ffcc00;
    color:#000;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.05)}
    100%{transform:scale(1)}
}

/* FOOTER BOX */
.footer-box{
    max-width:380px;
    margin:25px auto;
    padding:18px;
    border-radius:16px;
    border:2px solid #ffd700;
    background:rgba(0,0,0,0.35);
    text-align:center;
}

.footer-box p{
    color:#ffd700;
    font-weight:bold;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:10px;
}

.social-btn{
    font-size:28px;
    margin:0 10px;
    color:#ffd700;
}
</style>
</head>
